# ---------------------------------------------------------------------------
# Root Query
# ---------------------------------------------------------------------------

type Query {
  # Video queries
  video(id: ID!, part: [String!]): Video
  videos(ids: [ID!], chart: String, myRating: String, part: [String!], pageToken: String, maxResults: Int, regionCode: String, videoCategoryId: String): VideoListResponse

  # Channel queries
  channel(id: ID!, part: [String!]): Channel
  channels(ids: [ID!], mine: Boolean, part: [String!], pageToken: String, maxResults: Int, categoryId: String): ChannelListResponse

  # Playlist queries
  playlist(id: ID!, part: [String!]): Playlist
  playlists(ids: [ID!], channelId: ID, mine: Boolean, part: [String!], pageToken: String, maxResults: Int): PlaylistListResponse

  # Playlist item queries
  playlistItems(playlistId: ID!, part: [String!], videoId: ID, pageToken: String, maxResults: Int): PlaylistItemListResponse

  # Search queries
  search(q: String, type: String, channelId: ID, order: String, publishedAfter: DateTime, publishedBefore: DateTime, regionCode: String, videoCategoryId: String, videoType: String, eventType: String, pageToken: String, maxResults: Int, part: [String!]): SearchListResponse

  # Comment queries
  comment(id: ID!, part: [String!]): Comment
  comments(id: ID, parentId: ID, part: [String!], pageToken: String, maxResults: Int): CommentListResponse

  # Comment thread queries
  commentThread(id: ID!, part: [String!]): CommentThread
  commentThreads(videoId: ID, channelId: ID, id: ID, part: [String!], pageToken: String, maxResults: Int, moderationStatus: String, order: String, searchTerms: String): CommentThreadListResponse

  # Subscription queries
  subscriptions(mine: Boolean, channelId: ID, forChannelId: ID, part: [String!], pageToken: String, maxResults: Int, order: String): SubscriptionListResponse

  # Caption queries
  captions(videoId: ID!, part: [String!], id: [ID]): [Caption!]

  # Member queries
  members(mode: String, part: [String!], pageToken: String, maxResults: Int): MemberListResponse

  # Membership level queries
  membershipsLevels(part: [String!]): [MembershipLevel!]

  # Live broadcast queries
  liveBroadcast(id: ID!, part: [String!]): LiveBroadcast
  liveBroadcasts(id: [ID], broadcastStatus: String, mine: Boolean, part: [String!], pageToken: String, maxResults: Int, broadcastType: String): LiveBroadcastListResponse

  # Live stream queries
  liveStream(id: ID!, part: [String!]): LiveStream
  liveStreams(id: [ID], mine: Boolean, part: [String!], pageToken: String, maxResults: Int): LiveStreamListResponse

  # Live chat message queries
  liveChatMessages(liveChatId: ID!, part: [String!], pageToken: String, maxResults: Int, hl: String): LiveChatMessageListResponse

  # Localization queries
  i18nLanguages(part: [String!], hl: String): [I18nLanguage!]
  i18nRegions(part: [String!], hl: String): [I18nRegion!]

  # Category queries
  videoCategories(regionCode: String, hl: String, id: [ID], part: [String!]): [VideoCategory!]

  # Activity queries
  activities(mine: Boolean, channelId: ID, part: [String!], pageToken: String, maxResults: Int, publishedBefore: DateTime, publishedAfter: DateTime): ActivityListResponse

  # Abuse report reason queries
  videoAbuseReportReasons(part: [String!], hl: String): [VideoAbuseReportReason!]

  # Channel section queries
  channelSections(channelId: ID, id: [ID], mine: Boolean, part: [String!], hl: String): [ChannelSection!]
}

# ---------------------------------------------------------------------------
# Root Mutation
# ---------------------------------------------------------------------------

type Mutation {
  # Video mutations
  insertVideo(snippet: VideoSnippetInput!, status: VideoStatusInput): Video
  updateVideo(id: ID!, snippet: VideoSnippetInput, status: VideoStatusInput): Video
  deleteVideo(id: ID!): Boolean
  rateVideo(id: ID!, rating: String!): Boolean

  # Playlist mutations
  insertPlaylist(snippet: PlaylistSnippetInput!, status: PlaylistStatusInput): Playlist
  updatePlaylist(id: ID!, snippet: PlaylistSnippetInput, status: PlaylistStatusInput): Playlist
  deletePlaylist(id: ID!): Boolean

  # Playlist item mutations
  insertPlaylistItem(snippet: PlaylistItemSnippetInput!): PlaylistItem
  updatePlaylistItem(id: ID!, snippet: PlaylistItemSnippetInput!): PlaylistItem
  deletePlaylistItem(id: ID!): Boolean

  # Comment mutations
  insertComment(snippet: CommentSnippetInput!): Comment
  updateComment(id: ID!, snippet: CommentSnippetInput!): Comment
  deleteComment(id: ID!): Boolean
  markCommentAsSpam(id: ID!): Boolean
  setCommentModerationStatus(id: ID!, moderationStatus: String!, banAuthor: Boolean): Boolean

  # Comment thread mutations
  insertCommentThread(snippet: CommentThreadSnippetInput!): CommentThread
  updateCommentThread(id: ID!, snippet: CommentThreadSnippetInput!): CommentThread

  # Subscription mutations
  insertSubscription(snippet: SubscriptionSnippetInput!): Subscription
  deleteSubscription(id: ID!): Boolean

  # Caption mutations
  uploadCaption(videoId: ID!, snippet: CaptionSnippetInput!): Caption
  updateCaption(id: ID!, snippet: CaptionSnippetInput!): Caption
  deleteCaption(id: ID!): Boolean

  # Live broadcast mutations
  insertLiveBroadcast(snippet: LiveBroadcastSnippetInput!, status: LiveBroadcastStatusInput!): LiveBroadcast
  updateLiveBroadcast(id: ID!, snippet: LiveBroadcastSnippetInput, status: LiveBroadcastStatusInput): LiveBroadcast
  transitionLiveBroadcast(id: ID!, broadcastStatus: String!): LiveBroadcast
  deleteLiveBroadcast(id: ID!): Boolean
  bindLiveBroadcast(id: ID!, streamId: ID!): LiveBroadcast

  # Live stream mutations
  insertLiveStream(snippet: LiveStreamSnippetInput!, cdn: LiveStreamContentDetailsInput!): LiveStream
  updateLiveStream(id: ID!, snippet: LiveStreamSnippetInput, cdn: LiveStreamContentDetailsInput): LiveStream
  deleteLiveStream(id: ID!): Boolean

  # Live chat message mutations
  insertLiveChatMessage(snippet: LiveChatMessageSnippetInput!): LiveChatMessage
  deleteLiveChatMessage(id: ID!): Boolean

  # Live chat ban mutations
  insertLiveChatBan(snippet: LiveChatBanSnippetInput!): LiveChatBan
  deleteLiveChatBan(id: ID!): Boolean

  # Live chat moderator mutations
  insertLiveChatModerator(snippet: LiveChatModeratorSnippetInput!): LiveChatModerator
  deleteLiveChatModerator(id: ID!): Boolean

  # Thumbnail mutations
  uploadThumbnail(videoId: ID!, url: URL!): ThumbnailDetails

  # Channel banner mutations
  uploadChannelBanner(url: URL!): ChannelBanner

  # Watermark mutations
  setChannelWatermark(channelId: ID!, imageUrl: URL!, position: String, timing: String): Boolean
  unsetChannelWatermark(channelId: ID!): Boolean

  # Video abuse report
  reportVideoAbuse(videoId: ID!, reasonId: String!, secondaryReasonId: String, comments: String, language: String): Boolean

  # Channel section mutations
  insertChannelSection(snippet: ChannelSectionSnippetInput!): ChannelSection
  updateChannelSection(id: ID!, snippet: ChannelSectionSnippetInput!): ChannelSection
  deleteChannelSection(id: ID!): Boolean
}

input ChannelSectionSnippetInput {
  type: String!
  title: String
  position: Int
  defaultLanguage: String
}
