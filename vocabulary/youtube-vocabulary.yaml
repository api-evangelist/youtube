workflows:
- name: YouTube Analytics And Reporting
  description: Workflow combining YouTube Analytics and Reporting APIs for 
    comprehensive channel performance monitoring, custom report generation, and 
    bulk data export. Designed for data analysts, marketing teams, and content 
    strategists.
  tags:
  - YouTube
  - Analytics
  - Reporting
  - Metrics
  tools: 14
  file: analytics-and-reporting.yaml
- name: YouTube Community Engagement
  description: Workflow for managing community interactions including comments, 
    comment threads, subscriptions, and channel management. Designed for 
    community managers, social media teams, and content moderators.
  tags:
  - YouTube
  - Community
  - Comments
  - Subscriptions
  - Moderation
  tools: 12
  file: community-engagement.yaml
- name: YouTube Content Management
  description: Unified workflow for managing YouTube video content lifecycle 
    including uploading, updating, organizing into playlists, managing captions,
    and moderating comments. Designed for content creators, media teams, and 
    platform administrators.
  tags:
  - YouTube
  - Content Management
  - Video
  - Playlists
  - Captions
  tools: 15
  file: content-management.yaml
- name: YouTube Live Streaming
  description: Workflow for managing YouTube live events including scheduling 
    broadcasts, linking streams, managing live chat, and moderating live 
    interactions. Designed for live event producers, streaming teams, and 
    broadcast operators.
  tags:
  - YouTube
  - Live Streaming
  - Broadcasting
  - Live Chat
  tools: 14
  file: live-streaming.yaml
