source: >-
  https://developers.google.com/youtube/v3/libraries and the Google API client
  library registries. YouTube APIs are consumed through Google's general-purpose,
  first-party API client libraries (the same libraries used across all Google
  Discovery-based APIs); YouTube does not publish YouTube-specific SDK packages.
description: >-
  Official Google API client libraries that carry the YouTube Data, Analytics,
  Reporting, and Live Streaming APIs, plus the first-party embed/player JS
  libraries. Marked official:true only for Google-published packages.
