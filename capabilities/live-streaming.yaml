naftiko: 1.0.0-alpha2
info:
  label: YouTube Live Streaming
  description: Workflow for managing YouTube live events including scheduling broadcasts, linking streams, managing live chat,
    and moderating live interactions. Designed for live event producers, streaming teams, and broadcast operators.
  tags:
  - YouTube
  - Live Streaming
  - Broadcasting
  - Live Chat
  created: '2026-04-18'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    YOUTUBE_OAUTH_TOKEN: YOUTUBE_OAUTH_TOKEN
capability:
  consumes:
  - type: http
    namespace: youtube-live-streaming
    baseUri: https://www.googleapis.com/youtube/v3
    description: YouTube Live Streaming API for managing live broadcasts, streams, chat messages, and moderators.
    authentication:
      type: bearer
      token: '{{YOUTUBE_OAUTH_TOKEN}}'
    resources:
    - name: live-broadcasts
      path: /liveBroadcasts
      description: Operations for managing YouTube live broadcast events
      operations:
      - name: list-live-broadcasts
        method: GET
        description: Returns a list of YouTube broadcasts that match the API request parameters
        inputParameters:
        - name: part
          in: query
          type: string
          required: true
          description: Specifies a comma-separated list of one or more resource properties to include.
        - name: id
          in: query
          type: string
          required: false
          description: Comma-separated list of YouTube broadcast IDs for the resources being retrieved.
        - name: mine
          in: query
          type: boolean
          required: false
          description: Set to true to return only broadcasts owned by the authenticated user.
        - name: broadcastStatus
          in: query
          type: string
          required: false
          description: Filters the API response to only include broadcasts with the specified status.
        - name: broadcastType
          in: query
          type: string
          required: false
          description: Filters results by the type of broadcast.
        - name: maxResults
          in: query
          type: integer
          required: false
          description: The maximum number of items that should be returned.
        - name: pageToken
          in: query
          type: string
          required: false
          description: Identifies a specific page in the result set.
        - name: fields
          in: query
          type: string
          required: false
          description: Selector specifying which fields to include in a partial response.
        - name: key
          in: query
          type: string
          required: false
          description: API key for authentication.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: insert-live-broadcast
        method: POST
        description: Creates a broadcast
        inputParameters:
        - name: part
          in: query
          type: string
          required: true
          description: Specifies a comma-separated list of one or more resource properties to set.
        - name: fields
          in: query
          type: string
          required: false
          description: Selector specifying which fields to include in a partial response.
        - name: key
          in: query
          type: string
          required: false
          description: API key for authentication.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: update-live-broadcast
        method: PUT
        description: Updates a broadcast's settings
        inputParameters:
        - name: part
          in: query
          type: string
          required: true
          description: Specifies a comma-separated list of one or more resource properties to update.
        - name: fields
          in: query
          type: string
          required: false
          description: Selector specifying which fields to include in a partial response.
        - name: key
          in: query
          type: string
          required: false
          description: API key for authentication.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: delete-live-broadcast
        method: DELETE
        description: Deletes a broadcast
        inputParameters:
        - name: id
          in: query
          type: string
          required: true
          description: The ID of the broadcast to delete.
        - name: key
          in: query
          type: string
          required: false
          description: API key for authentication.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: live-broadcast-bind
      path: /liveBroadcasts/bind
      description: Operations for binding YouTube broadcasts to streams
      operations:
      - name: bind-live-broadcast
        method: POST
        description: Binds a YouTube broadcast to a stream or removes an existing binding
        inputParameters:
        - name: id
          in: query
          type: string
          required: true
          description: The unique ID of the broadcast that is being bound to a video stream.
        - name: part
          in: query
          type: string
          required: true
          description: Specifies a comma-separated list of one or more resource properties to include.
        - name: streamId
          in: query
          type: string
          required: false
          description: The unique ID of the video stream that is being bound to a broadcast.
        - name: key
          in: query
          type: string
          required: false
          description: API key for authentication.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: live-broadcast-transition
      path: /liveBroadcasts/transition
      description: Operations for transitioning YouTube broadcast states
      operations:
      - name: transition-live-broadcast
        method: POST
        description: Changes the status of a YouTube live broadcast
        inputParameters:
        - name: id
          in: query
          type: string
          required: true
          description: The unique ID of the broadcast that is transitioning to another status.
        - name: broadcastStatus
          in: query
          type: string
          required: true
          description: The broadcastStatus parameter identifies the state to which the broadcast is changing.
        - name: part
          in: query
          type: string
          required: true
          description: Specifies a comma-separated list of one or more resource properties to include.
        - name: key
          in: query
          type: string
          required: false
          description: API key for authentication.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: live-streams
      path: /liveStreams
      description: Operations for managing YouTube live video streams
      operations:
      - name: list-live-streams
        method: GET
        description: Returns a list of video streams that match the API request parameters
        inputParameters:
        - name: part
          in: query
          type: string
          required: true
          description: Specifies a comma-separated list of one or more resource properties to include.
        - name: id
          in: query
          type: string
          required: false
          description: Comma-separated list of live stream IDs for the resources being retrieved.
        - name: mine
          in: query
          type: boolean
          required: false
          description: Set to true to return only streams owned by the authenticated user.
        - name: maxResults
          in: query
          type: integer
          required: false
          description: The maximum number of items that should be returned.
        - name: pageToken
          in: query
          type: string
          required: false
          description: Identifies a specific page in the result set.
        - name: fields
          in: query
          type: string
          required: false
          description: Selector specifying which fields to include in a partial response.
        - name: key
          in: query
          type: string
          required: false
          description: API key for authentication.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: insert-live-stream
        method: POST
        description: Creates a video stream
        inputParameters:
        - name: part
          in: query
          type: string
          required: true
          description: Specifies a comma-separated list of one or more resource properties to set.
        - name: fields
          in: query
          type: string
          required: false
          description: Selector specifying which fields to include in a partial response.
        - name: key
          in: query
          type: string
          required: false
          description: API key for authentication.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: update-live-stream
        method: PUT
        description: Updates a video stream
        inputParameters:
        - name: part
          in: query
          type: string
          required: true
          description: Specifies a comma-separated list of one or more resource properties to update.
        - name: fields
          in: query
          type: string
          required: false
          description: Selector specifying which fields to include in a partial response.
        - name: key
          in: query
          type: string
          required: false
          description: API key for authentication.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: delete-live-stream
        method: DELETE
        description: Deletes a video stream
        inputParameters:
        - name: id
          in: query
          type: string
          required: true
          description: The ID of the live stream to delete.
        - name: key
          in: query
          type: string
          required: false
          description: API key for authentication.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: live-chat-messages
      path: /liveChatMessages
      description: Operations for managing messages in YouTube live chat
      operations:
      - name: list-live-chat-messages
        method: GET
        description: Lists live chat messages for a specific live broadcast
        inputParameters:
        - name: part
          in: query
          type: string
          required: true
          description: Specifies a comma-separated list of one or more resource properties to include.
        - name: liveChatId
          in: query
          type: string
          required: true
          description: The liveChatId parameter specifies the ID of the live chat whose messages will be returned.
        - name: maxResults
          in: query
          type: integer
          required: false
          description: The maximum number of items that should be returned.
        - name: pageToken
          in: query
          type: string
          required: false
          description: Identifies a specific page in the result set.
        - name: fields
          in: query
          type: string
          required: false
          description: Selector specifying which fields to include in a partial response.
        - name: key
          in: query
          type: string
          required: false
          description: API key for authentication.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: insert-live-chat-message
        method: POST
        description: Adds a message to a live chat
        inputParameters:
        - name: part
          in: query
          type: string
          required: true
          description: Specifies a comma-separated list of one or more resource properties to set.
        - name: fields
          in: query
          type: string
          required: false
          description: Selector specifying which fields to include in a partial response.
        - name: key
          in: query
          type: string
          required: false
          description: API key for authentication.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: delete-live-chat-message
        method: DELETE
        description: Deletes a chat message
        inputParameters:
        - name: id
          in: query
          type: string
          required: true
          description: The ID of the live chat message to delete.
        - name: key
          in: query
          type: string
          required: false
          description: API key for authentication.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: live-chat-moderators
      path: /liveChatModerators
      description: Operations for managing moderators in YouTube live chat
      operations:
      - name: list-live-chat-moderators
        method: GET
        description: Lists moderators for a live chat
        inputParameters:
        - name: part
          in: query
          type: string
          required: true
          description: Specifies a comma-separated list of one or more resource properties to include.
        - name: liveChatId
          in: query
          type: string
          required: true
          description: The liveChatId parameter specifies the YouTube live chat for which the API should return moderators.
        - name: maxResults
          in: query
          type: integer
          required: false
          description: The maximum number of items that should be returned.
        - name: pageToken
          in: query
          type: string
          required: false
          description: Identifies a specific page in the result set.
        - name: fields
          in: query
          type: string
          required: false
          description: Selector specifying which fields to include in a partial response.
        - name: key
          in: query
          type: string
          required: false
          description: API key for authentication.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: insert-live-chat-moderator
        method: POST
        description: Adds a new moderator for a live chat
        inputParameters:
        - name: part
          in: query
          type: string
          required: true
          description: Specifies a comma-separated list of one or more resource properties to set.
        - name: fields
          in: query
          type: string
          required: false
          description: Selector specifying which fields to include in a partial response.
        - name: key
          in: query
          type: string
          required: false
          description: API key for authentication.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: delete-live-chat-moderator
        method: DELETE
        description: Removes a chat moderator
        inputParameters:
        - name: id
          in: query
          type: string
          required: true
          description: The ID of the live chat moderator to remove.
        - name: key
          in: query
          type: string
          required: false
          description: API key for authentication.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8082
    namespace: live-streaming-api
    description: Unified REST API for YouTube live streaming workflows.
    resources:
    - path: /v1/broadcasts
      name: broadcasts
      description: Manage live broadcasts
      operations:
      - method: GET
        name: list-broadcasts
        description: List live broadcasts
        call: youtube-live.list-live-broadcasts
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-broadcast
        description: Create a new live broadcast
        call: youtube-live.insert-live-broadcast
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: update-broadcast
        description: Update broadcast settings
        call: youtube-live.update-live-broadcast
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: delete-broadcast
        description: Delete a broadcast
        call: youtube-live.delete-live-broadcast
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/streams
      name: streams
      description: Manage live video streams
      operations:
      - method: GET
        name: list-streams
        description: List live streams
        call: youtube-live.list-live-streams
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-stream
        description: Create a new live stream
        call: youtube-live.insert-live-stream
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: update-stream
        description: Update stream settings
        call: youtube-live.update-live-stream
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: delete-stream
        description: Delete a live stream
        call: youtube-live.delete-live-stream
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/chat-messages
      name: chat-messages
      description: Manage live chat messages
      operations:
      - method: GET
        name: list-chat-messages
        description: List live chat messages
        call: youtube-live.list-live-chat-messages
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: send-chat-message
        description: Send a live chat message
        call: youtube-live.insert-live-chat-message
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: delete-chat-message
        description: Delete a live chat message
        call: youtube-live.delete-live-chat-message
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/chat-moderators
      name: chat-moderators
      description: Manage live chat moderators
      operations:
      - method: GET
        name: list-moderators
        description: List live chat moderators
        call: youtube-live.list-live-chat-moderators
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: add-moderator
        description: Add a live chat moderator
        call: youtube-live.insert-live-chat-moderator
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: remove-moderator
        description: Remove a live chat moderator
        call: youtube-live.delete-live-chat-moderator
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9092
    namespace: live-streaming-mcp
    transport: http
    description: MCP server for AI-assisted YouTube live streaming management.
    tools:
    - name: list-broadcasts
      description: List YouTube live broadcasts
      hints:
        readOnly: true
        idempotent: true
      call: youtube-live.list-live-broadcasts
      outputParameters:
      - type: object
        mapping: $.
    - name: create-broadcast
      description: Create a new live broadcast event
      hints:
        readOnly: false
        idempotent: false
      call: youtube-live.insert-live-broadcast
      outputParameters:
      - type: object
        mapping: $.
    - name: update-broadcast
      description: Update live broadcast settings
      hints:
        readOnly: false
        idempotent: true
      call: youtube-live.update-live-broadcast
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-broadcast
      description: Delete a live broadcast
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: youtube-live.delete-live-broadcast
      outputParameters:
      - type: object
        mapping: $.
    - name: bind-broadcast
      description: Bind a broadcast to a video stream
      hints:
        readOnly: false
        idempotent: true
      call: youtube-live.bind-live-broadcast
      outputParameters:
      - type: object
        mapping: $.
    - name: transition-broadcast
      description: Transition broadcast status (testing, live, complete)
      hints:
        readOnly: false
        idempotent: false
      call: youtube-live.transition-live-broadcast
      outputParameters:
      - type: object
        mapping: $.
    - name: list-streams
      description: List live video streams
      hints:
        readOnly: true
        idempotent: true
      call: youtube-live.list-live-streams
      outputParameters:
      - type: object
        mapping: $.
    - name: create-stream
      description: Create a new live video stream
      hints:
        readOnly: false
        idempotent: false
      call: youtube-live.insert-live-stream
      outputParameters:
      - type: object
        mapping: $.
    - name: list-chat-messages
      description: List messages in live chat
      hints:
        readOnly: true
        idempotent: true
      call: youtube-live.list-live-chat-messages
      outputParameters:
      - type: object
        mapping: $.
    - name: send-chat-message
      description: Send a message to live chat
      hints:
        readOnly: false
        idempotent: false
      call: youtube-live.insert-live-chat-message
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-chat-message
      description: Delete a live chat message
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: youtube-live.delete-live-chat-message
      outputParameters:
      - type: object
        mapping: $.
    - name: list-moderators
      description: List live chat moderators
      hints:
        readOnly: true
        idempotent: true
      call: youtube-live.list-live-chat-moderators
      outputParameters:
      - type: object
        mapping: $.
    - name: add-moderator
      description: Add a live chat moderator
      hints:
        readOnly: false
        idempotent: false
      call: youtube-live.insert-live-chat-moderator
      outputParameters:
      - type: object
        mapping: $.
    - name: remove-moderator
      description: Remove a live chat moderator
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: youtube-live.delete-live-chat-moderator
      outputParameters:
      - type: object
        mapping: $.
