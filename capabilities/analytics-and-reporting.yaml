naftiko: 1.0.0-alpha2
info:
  label: YouTube Analytics And Reporting
  description: Workflow combining YouTube Analytics and Reporting APIs for comprehensive channel performance monitoring, custom
    report generation, and bulk data export. Designed for data analysts, marketing teams, and content strategists.
  tags:
  - YouTube
  - Analytics
  - Reporting
  - Metrics
  created: '2026-04-18'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    YOUTUBE_OAUTH_TOKEN: YOUTUBE_OAUTH_TOKEN
capability:
  consumes:
  - type: http
    namespace: youtube-analytics
    baseUri: https://youtubeanalytics.googleapis.com/v2
    description: YouTube Analytics API v2 for generating custom analytics reports and managing groups.
    authentication:
      type: bearer
      token: '{{YOUTUBE_OAUTH_TOKEN}}'
    resources:
    - name: reports
      path: /reports
      description: Operations for querying YouTube Analytics report data
      operations:
      - name: query-reports
        method: GET
        description: Retrieves YouTube Analytics data for a channel or content owner
        inputParameters:
        - name: ids
          in: query
          type: string
          required: true
          description: Identifies the YouTube channel or content owner for which the report is being retrieved.
        - name: startDate
          in: query
          type: string
          required: true
          description: The start date for fetching YouTube Analytics data in YYYY-MM-DD format.
        - name: endDate
          in: query
          type: string
          required: true
          description: The end date for fetching YouTube Analytics data in YYYY-MM-DD format.
        - name: metrics
          in: query
          type: string
          required: true
          description: A comma-separated list of YouTube Analytics metrics, such as views or likes, dislikes.
        - name: dimensions
          in: query
          type: string
          required: false
          description: A comma-separated list of YouTube Analytics dimensions, such as video or country.
        - name: filters
          in: query
          type: string
          required: false
          description: A list of filters that should be applied when retrieving YouTube Analytics data.
        - name: maxResults
          in: query
          type: integer
          required: false
          description: The maximum number of rows to include in the response.
        - name: sort
          in: query
          type: string
          required: false
          description: A comma-separated list of dimensions or metrics that determine the sort order.
        - name: startIndex
          in: query
          type: integer
          required: false
          description: An index of the first entity to retrieve.
        - name: currency
          in: query
          type: string
          required: false
          description: The currency to which financial metrics should be converted.
        - name: alt
          in: query
          type: string
          required: false
          description: Data format for the response.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: groups
      path: /groups
      description: Operations for managing YouTube Analytics groups
      operations:
      - name: list-groups
        method: GET
        description: Returns a collection of groups that match the API request parameters
        inputParameters:
        - name: id
          in: query
          type: string
          required: false
          description: Comma-separated list of YouTube group IDs for the resources being retrieved.
        - name: mine
          in: query
          type: boolean
          required: false
          description: Set to true to retrieve all groups owned by the authenticated user.
        - name: pageToken
          in: query
          type: string
          required: false
          description: Identifies a specific page in the result set that should be returned.
        - name: onBehalfOfContentOwner
          in: query
          type: string
          required: false
          description: Indicates that the request's authorization credentials identify a YouTube CMS user.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: insert-group
        method: POST
        description: Creates an Analytics group
        inputParameters:
        - name: onBehalfOfContentOwner
          in: query
          type: string
          required: false
          description: Indicates that the request's authorization credentials identify a YouTube CMS user.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: update-group
        method: PUT
        description: Modifies a group
        inputParameters:
        - name: onBehalfOfContentOwner
          in: query
          type: string
          required: false
          description: Indicates that the request's authorization credentials identify a YouTube CMS user.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: delete-group
        method: DELETE
        description: Deletes a group
        inputParameters:
        - name: id
          in: query
          type: string
          required: true
          description: The id parameter specifies the YouTube group ID for the group being deleted.
        - name: onBehalfOfContentOwner
          in: query
          type: string
          required: false
          description: Indicates that the request's authorization credentials identify a YouTube CMS user.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: group-items
      path: /groupItems
      description: Operations for managing items within YouTube Analytics groups
      operations:
      - name: list-group-items
        method: GET
        description: Returns a collection of group items that match the API request parameters
        inputParameters:
        - name: groupId
          in: query
          type: string
          required: true
          description: The id parameter specifies the unique ID of the group for which you want to retrieve group items.
        - name: onBehalfOfContentOwner
          in: query
          type: string
          required: false
          description: Indicates that the request's authorization credentials identify a YouTube CMS user.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: insert-group-item
        method: POST
        description: Creates a group item, adding a resource to an Analytics group
        inputParameters:
        - name: onBehalfOfContentOwner
          in: query
          type: string
          required: false
          description: Indicates that the request's authorization credentials identify a YouTube CMS user.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: delete-group-item
        method: DELETE
        description: Removes an item from a group
        inputParameters:
        - name: id
          in: query
          type: string
          required: true
          description: The id parameter specifies the YouTube group item ID for the group item being deleted.
        - name: onBehalfOfContentOwner
          in: query
          type: string
          required: false
          description: Indicates that the request's authorization credentials identify a YouTube CMS user.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: youtube-reporting
    baseUri: https://youtubereporting.googleapis.com/v1
    description: YouTube Reporting API v1 for scheduling reporting jobs and downloading bulk analytics data.
    authentication:
      type: bearer
      token: '{{YOUTUBE_OAUTH_TOKEN}}'
    resources:
    - name: jobs
      path: /jobs
      description: Operations for managing YouTube reporting jobs
      operations:
      - name: create-job
        method: POST
        description: Creates a reporting job
        inputParameters:
        - name: onBehalfOfContentOwner
          in: query
          type: string
          required: false
          description: The content owner's external ID on which behalf the user is acting on.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: list-jobs
        method: GET
        description: Lists all reporting jobs that have been scheduled for the channel or content owner
        inputParameters:
        - name: onBehalfOfContentOwner
          in: query
          type: string
          required: false
          description: The content owner's external ID on which behalf the user is acting on.
        - name: includeSystemManaged
          in: query
          type: boolean
          required: false
          description: If set to true, also returns system-managed reporting jobs.
        - name: pageToken
          in: query
          type: string
          required: false
          description: A token identifying a page of results to return.
        - name: pageSize
          in: query
          type: integer
          required: false
          description: The maximum number of items to return in the response.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: job-details
      path: /jobs/{jobId}
      description: Operations for retrieving and deleting specific reporting jobs
      operations:
      - name: get-job
        method: GET
        description: Gets the metadata for a specific reporting job
        inputParameters:
        - name: jobId
          in: path
          type: string
          required: true
          description: The ID of the job to retrieve.
        - name: onBehalfOfContentOwner
          in: query
          type: string
          required: false
          description: The content owner's external ID on which behalf the user is acting on.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: delete-job
        method: DELETE
        description: Deletes a reporting job
        inputParameters:
        - name: jobId
          in: path
          type: string
          required: true
          description: The ID of the job to delete.
        - name: onBehalfOfContentOwner
          in: query
          type: string
          required: false
          description: The content owner's external ID on which behalf the user is acting on.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: reports
      path: /jobs/{jobId}/reports
      description: Operations for retrieving generated reports
      operations:
      - name: list-reports
        method: GET
        description: Lists reports created by a specific reporting job
        inputParameters:
        - name: jobId
          in: path
          type: string
          required: true
          description: The ID of the job whose reports are being listed.
        - name: onBehalfOfContentOwner
          in: query
          type: string
          required: false
          description: The content owner's external ID on which behalf the user is acting on.
        - name: createdAfter
          in: query
          type: string
          required: false
          description: If specified, only reports created after the specified date/time are returned.
        - name: startTimeAtOrAfter
          in: query
          type: string
          required: false
          description: If specified, only reports covering data on or after this date are returned.
        - name: startTimeBefore
          in: query
          type: string
          required: false
          description: If specified, only reports covering data before this date are returned.
        - name: pageToken
          in: query
          type: string
          required: false
          description: A token identifying a page of results to return.
        - name: pageSize
          in: query
          type: integer
          required: false
          description: The maximum number of items to return in the response.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: report-details
      path: /jobs/{jobId}/reports/{reportId}
      description: Operations for retrieving specific report metadata
      operations:
      - name: get-report
        method: GET
        description: Gets the metadata for a specific report including its download URL
        inputParameters:
        - name: jobId
          in: path
          type: string
          required: true
          description: The ID of the job that created the report.
        - name: reportId
          in: path
          type: string
          required: true
          description: The ID of the report to retrieve.
        - name: onBehalfOfContentOwner
          in: query
          type: string
          required: false
          description: The content owner's external ID on which behalf the user is acting on.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: report-types
      path: /reportTypes
      description: Operations for listing available report types
      operations:
      - name: list-report-types
        method: GET
        description: Lists report types that the channel or content owner can retrieve
        inputParameters:
        - name: onBehalfOfContentOwner
          in: query
          type: string
          required: false
          description: The content owner's external ID on which behalf the user is acting on.
        - name: includeSystemManaged
          in: query
          type: boolean
          required: false
          description: If set to true, also returns system-managed report types.
        - name: pageToken
          in: query
          type: string
          required: false
          description: A token identifying a page of results to return.
        - name: pageSize
          in: query
          type: integer
          required: false
          description: The maximum number of items to return in the response.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8083
    namespace: analytics-reporting-api
    description: Unified REST API for YouTube analytics and reporting workflows.
    resources:
    - path: /v1/reports
      name: analytics-reports
      description: Query real-time analytics reports
      operations:
      - method: GET
        name: query-analytics
        description: Query YouTube Analytics data
        call: youtube-analytics.query-reports
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/groups
      name: analytics-groups
      description: Manage analytics groups
      operations:
      - method: GET
        name: list-groups
        description: List analytics groups
        call: youtube-analytics.list-groups
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-group
        description: Create an analytics group
        call: youtube-analytics.insert-group
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: update-group
        description: Update an analytics group
        call: youtube-analytics.update-group
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: delete-group
        description: Delete an analytics group
        call: youtube-analytics.delete-group
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/group-items
      name: group-items
      description: Manage items within analytics groups
      operations:
      - method: GET
        name: list-group-items
        description: List items in an analytics group
        call: youtube-analytics.list-group-items
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: add-group-item
        description: Add an item to a group
        call: youtube-analytics.insert-group-item
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: remove-group-item
        description: Remove an item from a group
        call: youtube-analytics.delete-group-item
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/reporting-jobs
      name: reporting-jobs
      description: Manage bulk reporting jobs
      operations:
      - method: GET
        name: list-jobs
        description: List reporting jobs
        call: youtube-reporting.list-jobs
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-job
        description: Create a reporting job
        call: youtube-reporting.create-job
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: delete-job
        description: Delete a reporting job
        call: youtube-reporting.delete-job
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/bulk-reports
      name: bulk-reports
      description: Access generated bulk reports
      operations:
      - method: GET
        name: list-bulk-reports
        description: List generated reports for a job
        call: youtube-reporting.list-reports
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/report-types
      name: report-types
      description: Available report types
      operations:
      - method: GET
        name: list-report-types
        description: List available report types
        call: youtube-reporting.list-report-types
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9093
    namespace: analytics-reporting-mcp
    transport: http
    description: MCP server for AI-assisted YouTube analytics and reporting.
    tools:
    - name: query-analytics
      description: Query YouTube Analytics data with dimensions and metrics
      hints:
        readOnly: true
        idempotent: true
      call: youtube-analytics.query-reports
      outputParameters:
      - type: object
        mapping: $.
    - name: list-analytics-groups
      description: List YouTube Analytics groups
      hints:
        readOnly: true
        idempotent: true
      call: youtube-analytics.list-groups
      outputParameters:
      - type: object
        mapping: $.
    - name: create-analytics-group
      description: Create an analytics group for organizing data
      hints:
        readOnly: false
        idempotent: false
      call: youtube-analytics.insert-group
      outputParameters:
      - type: object
        mapping: $.
    - name: update-analytics-group
      description: Update an analytics group
      hints:
        readOnly: false
        idempotent: true
      call: youtube-analytics.update-group
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-analytics-group
      description: Delete an analytics group
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: youtube-analytics.delete-group
      outputParameters:
      - type: object
        mapping: $.
    - name: list-group-items
      description: List items in an analytics group
      hints:
        readOnly: true
        idempotent: true
      call: youtube-analytics.list-group-items
      outputParameters:
      - type: object
        mapping: $.
    - name: add-group-item
      description: Add an item to an analytics group
      hints:
        readOnly: false
        idempotent: false
      call: youtube-analytics.insert-group-item
      outputParameters:
      - type: object
        mapping: $.
    - name: remove-group-item
      description: Remove an item from an analytics group
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: youtube-analytics.delete-group-item
      outputParameters:
      - type: object
        mapping: $.
    - name: list-reporting-jobs
      description: List bulk reporting jobs
      hints:
        readOnly: true
        idempotent: true
      call: youtube-reporting.list-jobs
      outputParameters:
      - type: object
        mapping: $.
    - name: create-reporting-job
      description: Create a new bulk reporting job
      hints:
        readOnly: false
        idempotent: false
      call: youtube-reporting.create-job
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-reporting-job
      description: Delete a bulk reporting job
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: youtube-reporting.delete-job
      outputParameters:
      - type: object
        mapping: $.
    - name: list-bulk-reports
      description: List generated bulk reports for a job
      hints:
        readOnly: true
        idempotent: true
      call: youtube-reporting.list-reports
      outputParameters:
      - type: object
        mapping: $.
    - name: get-bulk-report
      description: Get metadata for a specific bulk report
      hints:
        readOnly: true
        idempotent: true
      call: youtube-reporting.get-report
      outputParameters:
      - type: object
        mapping: $.
    - name: list-report-types
      description: List available report types
      hints:
        readOnly: true
        idempotent: true
      call: youtube-reporting.list-report-types
      outputParameters:
      - type: object
        mapping: $.
