naftiko: 1.0.0-alpha2
info:
  label: YouTube Data API — Search
  description: 'YouTube Data API — Search. 1 operations. Lead operation: Search YouTube Content. Self-contained Naftiko capability
    covering one Youtube business surface.'
  tags:
  - Youtube
  - Search
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    YOUTUBE_API_KEY: YOUTUBE_API_KEY
capability:
  consumes:
  - type: http
    namespace: data-search-2
    baseUri: https://www.googleapis.com/youtube/v3
    description: YouTube Data API — Search business capability. Self-contained, no shared references.
    resources:
    - name: search
      path: /search
      operations:
      - name: searchcontent
        method: GET
        description: Search YouTube Content
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.YOUTUBE_API_KEY}}'
  exposes:
  - type: rest
    namespace: data-search-2-rest
    port: 8080
    description: REST adapter for YouTube Data API — Search. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/search
      name: search
      description: REST surface for search.
      operations:
      - method: GET
        name: searchcontent
        description: Search YouTube Content
        call: data-search-2.searchcontent
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: data-search-2-mcp
    port: 9090
    transport: http
    description: MCP adapter for YouTube Data API — Search. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: search-youtube-content
      description: Search YouTube Content
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: data-search-2.searchcontent
      outputParameters:
      - type: object
        mapping: $.
