                  required: false
                  description: "Identifies a specific page in the result set."
                - name: fields
                  in: query
                  type: string
                  required: false
                  description: "Selector specifying which fields to include in a partial response."
                - name: key
                  in: query
                  type: string
                  required: false
                  description: "API key for authentication."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: insert-live-stream
              method: POST
              description: "Creates a video stream"
              inputParameters:
                - name: part
                  in: query
                  type: string
                  required: true
                  description: "Specifies a comma-separated list of one or more resource properties to set."
                - name: fields
                  in: query
                  type: string
                  required: false
                  description: "Selector specifying which fields to include in a partial response."
                - name: key
                  in: query
                  type: string
                  required: false
                  description: "API key for authentication."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-live-stream
              method: PUT
              description: "Updates a video stream"
              inputParameters:
                - name: part
                  in: query
                  type: string
                  required: true
