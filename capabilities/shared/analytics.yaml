naftiko: "1.0.0-alpha1"

info:
  label: "YouTube Analytics API"
  description: "The YouTube Analytics API lets you generate custom reports containing YouTube Analytics data for channels and content owners. Reports can be filtered by various dimensions such as date, country, and video, and measured by metrics including views, likes, estimated watch time, and revenue. The API also supports creating and managing groups and group items for organizing analytics data."
  tags:
    - YouTube
    - Analytics
    - Reporting
    - Data Analysis
    - Google Cloud
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      YOUTUBE_API_KEY: YOUTUBE_API_KEY
      YOUTUBE_OAUTH_TOKEN: YOUTUBE_OAUTH_TOKEN

capability:
  consumes:
    - type: http
      namespace: youtube-analytics
      baseUri: https://youtubeanalytics.googleapis.com/v2
      description: "YouTube Analytics API v2 for generating custom analytics reports and managing groups."
      authentication:
        type: bearer
        token: "{{YOUTUBE_OAUTH_TOKEN}}"
      resources:
        - name: reports
          path: /reports
          description: "Operations for querying YouTube Analytics report data"
          operations:
            - name: query-reports
              method: GET
              description: "Retrieves YouTube Analytics data for a channel or content owner"
              inputParameters:
                - name: ids
                  in: query
                  type: string
                  required: true
                  description: "Identifies the YouTube channel or content owner for which the report is being retrieved."
                - name: startDate
                  in: query
                  type: string
                  required: true
                  description: "The start date for fetching YouTube Analytics data in YYYY-MM-DD format."
                - name: endDate
                  in: query
                  type: string
                  required: true
                  description: "The end date for fetching YouTube Analytics data in YYYY-MM-DD format."
                - name: metrics
                  in: query
                  type: string
                  required: true
                  description: "A comma-separated list of YouTube Analytics metrics, such as views or likes, dislikes."
                - name: dimensions
                  in: query
                  type: string
                  required: false
                  description: "A comma-separated list of YouTube Analytics dimensions, such as video or country."
                - name: filters
                  in: query
                  type: string
                  required: false
                  description: "A list of filters that should be applied when retrieving YouTube Analytics data."
                - name: maxResults
                  in: query
                  type: integer
                  required: false
                  description: "The maximum number of rows to include in the response."
                - name: sort
                  in: query
                  type: string
                  required: false
                  description: "A comma-separated list of dimensions or metrics that determine the sort order."
                - name: startIndex
                  in: query
                  type: integer
                  required: false
                  description: "An index of the first entity to retrieve."
                - name: currency
                  in: query
                  type: string
                  required: false
                  description: "The currency to which financial metrics should be converted."
                - name: alt
                  in: query
                  type: string
                  required: false
                  description: "Data format for the response."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: groups
          path: /groups
          description: "Operations for managing YouTube Analytics groups"
          operations:
            - name: list-groups
              method: GET
              description: "Returns a collection of groups that match the API request parameters"
              inputParameters:
                - name: id
                  in: query
                  type: string
                  required: false
                  description: "Comma-separated list of YouTube group IDs for the resources being retrieved."
                - name: mine
                  in: query
                  type: boolean
                  required: false
                  description: "Set to true to retrieve all groups owned by the authenticated user."
                - name: pageToken
                  in: query
                  type: string
                  required: false
                  description: "Identifies a specific page in the result set that should be returned."
                - name: onBehalfOfContentOwner
                  in: query
                  type: string
                  required: false
                  description: "Indicates that the request's authorization credentials identify a YouTube CMS user."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: insert-group
              method: POST
              description: "Creates an Analytics group"
              inputParameters:
                - name: onBehalfOfContentOwner
                  in: query
                  type: string
                  required: false
                  description: "Indicates that the request's authorization credentials identify a YouTube CMS user."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-group
              method: PUT
              description: "Modifies a group"
              inputParameters:
                - name: onBehalfOfContentOwner
                  in: query
                  type: string
                  required: false
                  description: "Indicates that the request's authorization credentials identify a YouTube CMS user."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-group
              method: DELETE
              description: "Deletes a group"
              inputParameters:
                - name: id
                  in: query
                  type: string
                  required: true
                  description: "The id parameter specifies the YouTube group ID for the group being deleted."
                - name: onBehalfOfContentOwner
                  in: query
                  type: string
                  required: false
                  description: "Indicates that the request's authorization credentials identify a YouTube CMS user."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: group-items
          path: /groupItems
          description: "Operations for managing items within YouTube Analytics groups"
          operations:
            - name: list-group-items
              method: GET
              description: "Returns a collection of group items that match the API request parameters"
              inputParameters:
                - name: groupId
                  in: query
                  type: string
                  required: true
                  description: "The id parameter specifies the unique ID of the group for which you want to retrieve group items."
                - name: onBehalfOfContentOwner
                  in: query
                  type: string
                  required: false
                  description: "Indicates that the request's authorization credentials identify a YouTube CMS user."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: insert-group-item
              method: POST
              description: "Creates a group item, adding a resource to an Analytics group"
              inputParameters:
                - name: onBehalfOfContentOwner
                  in: query
                  type: string
                  required: false
                  description: "Indicates that the request's authorization credentials identify a YouTube CMS user."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-group-item
              method: DELETE
              description: "Removes an item from a group"
              inputParameters:
                - name: id
                  in: query
                  type: string
                  required: true
                  description: "The id parameter specifies the YouTube group item ID for the group item being deleted."
                - name: onBehalfOfContentOwner
                  in: query
                  type: string
                  required: false
                  description: "Indicates that the request's authorization credentials identify a YouTube CMS user."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8101
      namespace: youtube-analytics-rest
      resources:
        - path: /v1/reports
          name: reports
          operations:
            - method: GET
              name: query-reports
              description: "Retrieves YouTube Analytics data for a channel or content owner"
              call: "youtube-analytics.query-reports"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/groups
          name: groups
          operations:
            - method: GET
              name: list-groups
              description: "Returns a collection of groups that match the API request parameters"
              call: "youtube-analytics.list-groups"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: insert-group
              description: "Creates an Analytics group"
              call: "youtube-analytics.insert-group"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: PUT
              name: update-group
              description: "Modifies a group"
              call: "youtube-analytics.update-group"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: DELETE
              name: delete-group
              description: "Deletes a group"
              call: "youtube-analytics.delete-group"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/group-items
          name: group-items
          operations:
            - method: GET
              name: list-group-items
              description: "Returns a collection of group items that match the API request parameters"
              call: "youtube-analytics.list-group-items"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: insert-group-item
              description: "Creates a group item, adding a resource to an Analytics group"
              call: "youtube-analytics.insert-group-item"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: DELETE
              name: delete-group-item
              description: "Removes an item from a group"
              call: "youtube-analytics.delete-group-item"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9101
      namespace: youtube-analytics-mcp
      transport: http
      tools:
        - name: query-reports
          description: "Retrieves YouTube Analytics data for a channel or content owner"
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "youtube-analytics.query-reports"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-groups
          description: "Returns a collection of groups that match the API request parameters"
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "youtube-analytics.list-groups"
          outputParameters:
            - type: object
              mapping: "$."
        - name: insert-group
          description: "Creates an Analytics group"
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "youtube-analytics.insert-group"
          outputParameters:
            - type: object
              mapping: "$."
        - name: update-group
          description: "Modifies a group"
          hints:
            readOnly: false
            destructive: false
            idempotent: true
          call: "youtube-analytics.update-group"
          outputParameters:
            - type: object
              mapping: "$."
        - name: delete-group
          description: "Deletes a group"
          hints:
            readOnly: false
            destructive: true
            idempotent: true
          call: "youtube-analytics.delete-group"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-group-items
          description: "Returns a collection of group items that match the API request parameters"
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "youtube-analytics.list-group-items"
          outputParameters:
            - type: object
              mapping: "$."
        - name: insert-group-item
          description: "Creates a group item, adding a resource to an Analytics group"
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "youtube-analytics.insert-group-item"
          outputParameters:
            - type: object
              mapping: "$."
        - name: delete-group-item
          description: "Removes an item from a group"
          hints:
            readOnly: false
            destructive: true
            idempotent: true
          call: "youtube-analytics.delete-group-item"
          outputParameters:
            - type: object
              mapping: "$."
