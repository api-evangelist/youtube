naftiko: 1.0.0-alpha2
info:
  label: YouTube Data API — Captions
  description: 'YouTube Data API — Captions. 1 operations. Lead operation: Youtube List Video Captions. Self-contained Naftiko
    capability covering one Youtube business surface.'
  tags:
  - Youtube
  - Captions
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    YOUTUBE_API_KEY: YOUTUBE_API_KEY
capability:
  consumes:
  - type: http
    namespace: data-captions-2
    baseUri: https://www.googleapis.com/youtube/v3
    description: YouTube Data API — Captions business capability. Self-contained, no shared references.
    resources:
    - name: captions
      path: /captions
      operations:
      - name: listcaptions
        method: GET
        description: Youtube List Video Captions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.YOUTUBE_API_KEY}}'
  exposes:
  - type: rest
    namespace: data-captions-2-rest
    port: 8080
    description: REST adapter for YouTube Data API — Captions. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/captions
      name: captions
      description: REST surface for captions.
      operations:
      - method: GET
        name: listcaptions
        description: Youtube List Video Captions
        call: data-captions-2.listcaptions
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: data-captions-2-mcp
    port: 9090
    transport: http
    description: MCP adapter for YouTube Data API — Captions. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: youtube-list-video-captions
      description: Youtube List Video Captions
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: data-captions-2.listcaptions
      outputParameters:
      - type: object
        mapping: $.
