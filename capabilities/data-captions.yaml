naftiko: 1.0.0-alpha2
info:
  label: YouTube Data API v3 — Captions
  description: 'YouTube Data API v3 — Captions. 4 operations. Lead operation: Youtube List Caption Tracks. Self-contained
    Naftiko capability covering one Youtube business surface.'
  tags:
  - Youtube
  - Captions
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    YOUTUBE_API_KEY: YOUTUBE_API_KEY
capability:
  consumes:
  - type: http
    namespace: data-captions
    baseUri: https://www.googleapis.com/youtube/v3
    description: YouTube Data API v3 — Captions business capability. Self-contained, no shared references.
    resources:
    - name: captions
      path: /captions
      operations:
      - name: youtubecaptionslist
        method: GET
        description: Youtube List Caption Tracks
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: videoId
          in: query
          type: string
          description: The ID of the video for which the API should return caption tracks.
          required: true
        - name: id
          in: query
          type: string
          description: Comma-separated list of caption track IDs to retrieve.
      - name: youtubecaptionsinsert
        method: POST
        description: Youtube Upload a Caption Track
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: youtubecaptionsupdate
        method: PUT
        description: Youtube Update a Caption Track
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: youtubecaptionsdelete
        method: DELETE
        description: Youtube Delete a Caption Track
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: query
          type: string
          description: The ID of the caption track to delete.
          required: true
    authentication:
      type: bearer
      token: '{{env.YOUTUBE_API_KEY}}'
  exposes:
  - type: rest
    namespace: data-captions-rest
    port: 8080
    description: REST adapter for YouTube Data API v3 — Captions. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/captions
      name: captions
      description: REST surface for captions.
      operations:
      - method: GET
        name: youtubecaptionslist
        description: Youtube List Caption Tracks
        call: data-captions.youtubecaptionslist
        with:
          videoId: rest.videoId
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: youtubecaptionsinsert
        description: Youtube Upload a Caption Track
        call: data-captions.youtubecaptionsinsert
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: youtubecaptionsupdate
        description: Youtube Update a Caption Track
        call: data-captions.youtubecaptionsupdate
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: youtubecaptionsdelete
        description: Youtube Delete a Caption Track
        call: data-captions.youtubecaptionsdelete
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: data-captions-mcp
    port: 9090
    transport: http
    description: MCP adapter for YouTube Data API v3 — Captions. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: youtube-list-caption-tracks
      description: Youtube List Caption Tracks
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: data-captions.youtubecaptionslist
      with:
        videoId: tools.videoId
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: youtube-upload-caption-track
      description: Youtube Upload a Caption Track
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: data-captions.youtubecaptionsinsert
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: youtube-update-caption-track
      description: Youtube Update a Caption Track
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: data-captions.youtubecaptionsupdate
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: youtube-delete-caption-track
      description: Youtube Delete a Caption Track
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: data-captions.youtubecaptionsdelete
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
