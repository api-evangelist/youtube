        destructive: false
        idempotent: false
      call: live-streaming-livebroadcasts.youtubelivebroadcastsinsert
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: youtube-update-live-broadcast
      description: Youtube Update a Live Broadcast
      hints:
        readOnly: false
