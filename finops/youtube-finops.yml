specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: YouTube (Google)
providerId: youtube
created: '2026-05-04'
modified: '2026-05-04'
reconciled: true
tags:
  - FinOps
  - FOCUS
  - Video Platform
description: FOCUS-aligned FinOps for YouTube (Google).
sources:
  - https://developers.google.com/youtube/v3/getting-started
  - https://focus.finops.org/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: YouTube (Google)
serviceCategory: Video Platform
billingModel:
  pricingCategory: Pay-As-You-Go + Committed Use
  billingFrequency: Monthly
  billingCurrency: USD
focusColumns:
  ServiceName: YouTube (Google)
  ServiceCategory: Video Platform
  ProviderName: YouTube (Google)
  PublisherName: YouTube (Google)
  BillingCurrency: USD
meters:
  - name: compute_hours
    unit: instance-hour
    aggregation: sum
    dimensions:
      - service
      - region
      - instance_type
      - tenant
  - name: storage
    unit: GB-month
    aggregation: max
    dimensions:
      - service
      - tier
  - name: data_transfer
    unit: GB
    aggregation: sum
    dimensions:
      - egress_type
      - region_pair
  - name: api_requests
    unit: request
    aggregation: sum
    dimensions:
      - service
      - operation
  - name: managed_services
    unit: varies
    aggregation: sum
    dimensions:
      - service
principles:
  - name: Visibility
    description: Track YouTube (Google) consumption monthly.
  - name: Allocation
    description: Tag usage to teams/cost centers for chargeback.
  - name: Optimization
    description: Right-size; reclaim unused entitlements.
  - name: Accountability
    description: Set spend alerts; quarterly review.
